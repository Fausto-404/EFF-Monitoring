version: "3.8"

services:
  eff-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eff
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eff_password}
      POSTGRES_DB: eff_monitoring
    volumes:
      - eff-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eff -d eff_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  eff-redis:
    image: redis:7-alpine
    volumes:
      - eff-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  eff-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://eff:${POSTGRES_PASSWORD:-eff_password}@eff-postgres:5432/eff_monitoring}
      REDIS_URL: ${REDIS_URL:-redis://eff-redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "8000:8000"
    depends_on:
      - eff-postgres
      - eff-redis
    restart: unless-stopped

  eff-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://eff:${POSTGRES_PASSWORD:-eff_password}@eff-postgres:5432/eff_monitoring}
      REDIS_URL: ${REDIS_URL:-redis://eff-redis:6379/0}
    command: ["python", "-m", "app.workers.worker"]
    depends_on:
      - eff-api
    restart: unless-stopped

  eff-web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "8080:80"
    depends_on:
      - eff-api
    restart: unless-stopped

volumes:
  eff-postgres-data:
  eff-redis-data:
